<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1b2e" stroke="#6366f1" stroke-width="3"/>
  
  <!-- Brain/Memory symbol (Engram) -->
  <path d="M70 85 C70 65, 90 55, 100 55 C110 55, 130 65, 130 85 C130 95, 125 100, 120 105 C115 110, 115 115, 115 120" 
        fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <path d="M80 85 C80 75, 90 68, 100 68 C110 68, 120 75, 120 85 C120 92, 117 96, 113 100" 
        fill="none" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Lightning bolt (Power) -->
  <path d="M95 95 L105 95 L100 110 L112 110 L92 135 L98 118 L88 118 Z" 
        fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
  
  <!-- Connection nodes (MCP) -->
  <circle cx="55" cy="100" r="6" fill="#34d399" stroke="#10b981" stroke-width="2"/>
  <circle cx="145" cy="100" r="6" fill="#34d399" stroke="#10b981" stroke-width="2"/>
  <circle cx="100" cy="150" r="6" fill="#34d399" stroke="#10b981" stroke-width="2"/>
  
  <!-- Connection lines -->
  <line x1="61" y1="100" x2="75" y2="95" stroke="#6ee7b7" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="139" y1="100" x2="125" y2="95" stroke="#6ee7b7" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="100" y1="144" x2="100" y2="135" stroke="#6ee7b7" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  
  <!-- Labels for nodes -->
  <text x="55" y="82" text-anchor="middle" font-size="8" font-family="monospace" fill="#a7f3d0">ENG</text>
  <text x="145" y="82" text-anchor="middle" font-size="8" font-family="monospace" fill="#a7f3d0">C7</text>
  <text x="100" y="167" text-anchor="middle" font-size="8" font-family="monospace" fill="#a7f3d0">ATL</text>
  
  <!-- Title -->
  <text x="100" y="42" text-anchor="middle" font-size="11" font-family="system-ui, sans-serif" font-weight="bold" fill="#e0e7ff">KIRO POWERS</text>
  <text x="100" y="188" text-anchor="middle" font-size="9" font-family="system-ui, sans-serif" fill="#94a3b8">MCP KIT</text>
</svg>
